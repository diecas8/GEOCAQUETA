<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geoportal APS — Mapa</title>
    <style>
        :root {
            --primary: #2E7D32;
            --dark: #1b5e20;
            --light: #f4f7f6;
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        body { margin: 0; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        header {
            background: var(--primary);
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-sizing: border-box;
            z-index: 1000;
        }
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .status { font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
        
        /* Map Container */
        #map {
            flex: 1;
            background: #e5e5e5;
            position: relative;
            width: 100%;
            /* Placeholder pattern for map */
            background-image: radial-gradient(#ccc 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Floating Tools (Mobile Optimized) */
        .tools-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 10px;
            border-radius: 50px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 10px;
            z-index: 900;
            overflow-x: auto;
            max-width: 90%;
        }
        .tool-btn {
            background: #f0f0f0;
            border: 2px solid transparent;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .tool-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--dark);
        }

        /* Side Menu */
        #sideMenu {
            position: fixed;
            top: 60px;
            left: -280px;
            width: 280px;
            height: calc(100vh - 60px);
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 999;
            overflow-y: auto;
            padding: 10px;
        }
        #sideMenu.open { left: 0; }
        .menu-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .menu-item:hover { background: #f9f9f9; }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .close { font-size: 24px; cursor: pointer; }
        
        /* Form Elements */
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #ccc; color: #333; }

        /* GPS & Info Overlay */
        .overlay-info {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            padding: 5px 10px;
            border-radius: 4px;
            box-shadow: var(--shadow);
            font-size: 12px;
            z-index: 800;
        }
    </style>
</head>
<body>

    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div style="font-weight: bold;">🌿 Geoportal APS</div>
        <div class="status">📶 Conectado</div>
    </header>

    <div id="sideMenu">
        <div class="menu-item" onclick="openModal('pdfModal')">🗺️ Exportar PDF</div>
        <div class="menu-item" onclick="window.location.href='reporte.html'">📋 Ver Reportes</div>
        <div class="menu-item">🗂️ Capas APS</div>
        <div class="menu-item">🏘️ Municipios</div>
        <div class="menu-item" style="color: red;" onclick="window.location.href='index.html'">⏻ Salir</div>
    </div>

    <div id="map">
        <div class="overlay-info">📍 Lat: 0.000 | Lng: 0.000</div>
        
        <!-- Barra de Herramientas de Edición (Móvil First) -->
        <div class="tools-bar">
            <div class="tool-btn" onclick="selectTool('predio')" title="Predio">🏞️</div>
            <div class="tool-btn" onclick="selectTool('punto')" title="Punto APS">📍</div>
            <div class="tool-btn" onclick="selectTool('linea')" title="Línea APS">〰️</div>
            <div class="tool-btn" onclick="selectTool('poligono')" title="Polígono APS">⬡</div>
            <div class="tool-btn" onclick="clearDrawings()" title="Limpiar">🗑️</div>
        </div>
    </div>

    <!-- Modal Editar Predio -->
    <div id="modalPredio" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>✏️ Editar Predio</h3><span class="close" onclick="closeModal('modalPredio')">&times;</span></div>
            <label>Nombre del predio *</label><input type="text">
            <label>Municipio</label><input type="text">
            <label>Área (ha)</label><input type="number">
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal('modalPredio')">Cancelar</button>
                <button class="btn btn-primary" onclick="closeModal('modalPredio')">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal Nuevo Reporte -->
    <div id="modalReporte" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>📍 Nuevo Reporte APS</h3><span class="close" onclick="closeModal('modalReporte')">&times;</span></div>
            <label>Nombre *</label><input type="text">
            <label>Tipo</label>
            <select>
                <option>APS línea</option>
                <option>APS poligonal</option>
                <option>APS puntual</option>
            </select>
            <label>Comentarios</label><textarea style="width:100%; padding:10px; margin-bottom:15px;"></textarea>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal('modalReporte')">Cancelar</button>
                <button class="btn btn-primary" onclick="closeModal('modalReporte')">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        // Menú Lateral
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
        }

        // Modales
        function openModal(id) {
            // Simplificación para demo: abre modal genérico si es PDF, otros específicos
            if(id === 'pdfModal') alert('Generando PDF...'); 
        }
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // Herramientas de Dibujo
        let currentTool = null;
        function selectTool(tool) {
            // Remover clase active de todos
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            // Activar seleccionado (busca por onclick attribute para demo simple)
            event.currentTarget.classList.add('active');
            currentTool = tool;
            
            if(tool === 'punto' || tool === 'linea' || tool === 'poligono') {
                openModal('modalReporte');
            } else if (tool === 'predio') {
                openModal('modalPredio');
            }
            
            console.log("Herramienta activa:", tool);
            // Aquí iría la lógica de Leaflet/OpenLayers para activar el draw control
        }

        function clearDrawings() {
            if(confirm('¿Borrar todos los dibujos temporales?')) {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                currentTool = null;
            }
        }

        // Simulación de GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                document.querySelector('.overlay-info').innerText = 
                    `📍 Lat: ${pos.coords.latitude.toFixed(4)} | Lng: ${pos.coords.longitude.toFixed(4)}`;
            });
        }
    </script>
</body>
</html>
