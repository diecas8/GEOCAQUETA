<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<body>

<!-- SPLASH -->
<div id="splash"><div class="sl">🌿</div><div class="sr"></div>Verificando acceso…</div>

<!-- HEADER, SIDEBAR, MAP (igual que antes) -->
<!-- ... (estructura HTML idéntica a la versión anterior) ... -->

<script>
  // ==================== CONFIGURACIÓN Y SUPABASE ====================
  const SB_URL = "https://nyqzlkfphssodbsgeeob.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55cXpsa2ZwaHNzb2Ric2dlZW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMzg5ODAsImV4cCI6MjA4OTcxNDk4MH0.D0mv8NNf3w362u1Q9PRcy9H_vO46u6jIva3SpMaKLng";
  const sb = window.supabase.createClient(SB_URL, SB_KEY);

  // ==================== AUTENTICACIÓN CON TIMEOUT ====================
  const splash = document.getElementById('splash');
  let authResolved = false;
  let authTimeout = setTimeout(() => {
    if (!authResolved) {
      console.warn('Timeout de autenticación, redirigiendo a login');
      window.location.replace('index.html');
    }
  }, 5000);

  if (sessionStorage.getItem('guest')) {
    authResolved = true;
    clearTimeout(authTimeout);
    splash.style.display = 'none';
  } else {
    sb.auth.getSession()
      .then(({data}) => {
        authResolved = true;
        clearTimeout(authTimeout);
        if (data?.session) {
          splash.style.display = 'none';
        } else {
          window.location.replace('index.html');
        }
      })
      .catch((err) => {
        console.error('Error de autenticación:', err);
        authResolved = true;
        clearTimeout(authTimeout);
        window.location.replace('index.html');
      });
  }

  async function doLogout() {
    await sb.auth.signOut().catch(()=>{});
    sessionStorage.removeItem('guest');
    window.location.replace('index.html');
  }

  // ==================== OFFLINE QUEUE ====================
  let q = JSON.parse(localStorage.getItem('pendingQueue') || '[]');
  function saveQ() { localStorage.setItem('pendingQueue', JSON.stringify(q)); updatePendingBadge(); }
  function updatePendingBadge() {
    const badge = document.getElementById('pendingBadge');
    const count = q.length;
    const countSpan = document.getElementById('pendingCount');
    if(countSpan) countSpan.textContent = count;
    if(badge) badge.style.display = count ? 'inline-flex' : 'none';
  }
  async function syncQ() {
    if (!navigator.onLine || !q.length) return;
    const syncBar = document.getElementById('syncBar');
    if(syncBar) syncBar.style.display = 'flex';
    const toRetry = [];
    for (let i = 0; i < q.length; i++) {
      try {
        const { error } = await sb.from(q[i].table).insert([q[i].data]);
        if (error) throw error;
      } catch(e) {
        toRetry.push(q[i]);
      }
    }
    q = toRetry;
    saveQ();
    if(syncBar) syncBar.style.display = 'none';
    if (toRetry.length < q.length) {
      showT('✅ ' + (q.length - toRetry.length) + ' registro(s) sincronizado(s)');
      refreshAll();
    }
    if (toRetry.length > 0) {
      setTimeout(syncQ, 5000);
    }
  }
  async function qSave(table, data) {
    if (navigator.onLine) {
      try {
        const { error } = await sb.from(table).insert([data]);
        if (error) throw error;
        return true;
      } catch(e) {
        q.push({ table, data }); saveQ();
        showT('⚠️ Sin conexión — guardado localmente', true);
        return false;
      }
    }
    q.push({ table, data }); saveQ();
    showT('📱 Offline — se enviará al reconectarse', true);
    return false;
  }
  window.addEventListener('online',  () => { setConn(true);  syncQ(); });
  window.addEventListener('offline', () => setConn(false));
  function setConn(on) {
    const el = document.getElementById('connStatus');
    if(el) {
      el.className = 'pill' + (on ? '' : ' off');
      el.innerHTML = '<span class="dot"></span><span class="hb-txt">' + (on ? 'Conectado' : 'Sin conexión') + '</span>';
    }
  }
  saveQ();
  syncQ();

  // ==================== INICIALIZACIÓN DEL MAPA (DOMContentLoaded) ====================
  let map, drawn, drawControl, AL, LG, legData, munLayer;
  let pending = null;
  let sbnTipoActual = null, sbnLayerActual = null;
  let rCoords = null, rMarker = null;

  document.addEventListener('DOMContentLoaded', () => {
    // Verificar que el contenedor del mapa existe
    const mapContainer = document.getElementById('map');
    if (!mapContainer) {
      console.error('Error: contenedor del mapa no encontrado');
      return;
    }

    // Inicializar mapa
    map = L.map('map', { zoomControl: false, tap: true }).setView([4.6, -74.1], 8);
    L.control.zoom({ position: 'topright' }).addTo(map);

    // Capas base
    const BM = {
      satellite: L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom:20, subdomains:['mt0','mt1','mt2','mt3'], attribution:'© Google Maps' }),
      esri: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom:20, attribution:'© Esri, Maxar' }),
      hybrid: L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom:20, subdomains:['mt0','mt1','mt2','mt3'], attribution:'© Google Maps' }),
      topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom:17, attribution:'© OpenTopoMap' })
    };
    let curBM = 'satellite';
    BM.satellite.addTo(map);
    window.setBM = function(type) {
      map.removeLayer(BM[curBM]); curBM = type; BM[type].addTo(map);
      document.querySelectorAll('.bmbtn').forEach(b => b.classList.remove('act'));
      const btn = document.getElementById('bm-' + type);
      if(btn) btn.classList.add('act');
      closeSBonMobile();
    };

    map.on('mousemove', e => {
      const cbar = document.getElementById('cbar');
      if(cbar) cbar.textContent = e.latlng.lat.toFixed(5) + ', ' + e.latlng.lng.toFixed(5);
    });

    // ==================== SIDEBAR MÓVIL ====================
    const sb_el = document.getElementById('sb');
    const overlay = document.getElementById('sbOverlay');
    const menuBtn = document.getElementById('menuBtn');
    function openSB()  { if(sb_el) sb_el.classList.add('open'); if(overlay) overlay.classList.add('on'); localStorage.setItem('sidebarOpen', 'true'); }
    function closeSB() { if(sb_el) sb_el.classList.remove('open'); if(overlay) overlay.classList.remove('on'); localStorage.setItem('sidebarOpen', 'false'); }
    function toggleSB(){ sb_el && sb_el.classList.contains('open') ? closeSB() : openSB(); }
    if(menuBtn) menuBtn.addEventListener('click', e => { e.stopPropagation(); toggleSB(); });
    if(overlay) overlay.addEventListener('click', closeSB);
    const mc = document.getElementById('mc');
    if(mc) mc.addEventListener('click', () => { if (window.innerWidth < 769 && sb_el && sb_el.classList.contains('open')) closeSB(); });
    window.closeSBonMobile = function() { if (window.innerWidth < 769) closeSB(); };
    if (localStorage.getItem('sidebarOpen') === 'true' && window.innerWidth >= 769 && sb_el) sb_el.classList.add('open');

    // ==================== LEYENDA PERSISTENTE ====================
    const legBtn = document.getElementById('legBtn');
    const legBody = document.getElementById('leg-body');
    let legCollapsed = localStorage.getItem('legendCollapsed') === 'true';
    if(legBtn) legBtn.textContent = legCollapsed ? '+' : '−';
    if(legBody) legBody.style.display = legCollapsed ? 'none' : '';
    if(legBtn) {
      legBtn.addEventListener('click', () => {
        legCollapsed = !legCollapsed;
        if(legBody) legBody.style.display = legCollapsed ? 'none' : '';
        legBtn.textContent = legCollapsed ? '+' : '−';
        localStorage.setItem('legendCollapsed', legCollapsed);
      });
    }

    // ==================== MUNICIPIOS (datos hardcodeados) ====================
    // (Se incluye la definición completa de MUNICIPIOS_SBN igual que antes)
    // ... (código completo de MUNICIPIOS_SBN y la función irAMunicipio)
    // Por brevedad, se omite la repetición aquí, pero en el archivo final estará.
    // Nota: en la versión final se incluirán todos los polígonos.

    // ==================== CAPAS Y DATOS ====================
    AL = {};
    LG = {};
    legData = {};
    const CC = { /* ... */ };
    const styleUS = f => ({ color: CC[f.properties.cultivo] || '#f59e0b', weight: 2.5, fillOpacity: 0 });
    const stylePR = { color: '#10b981', weight: 2.5, fillOpacity: 0 };

    function renderLegend() { /* igual que antes */ }
    function centroid(f) { try { const c = turf.centroid(f); return [c.geometry.coordinates[1], c.geometry.coordinates[0]]; } catch(e) { return null; } }
    function mkLabel(ll, text, col) { return L.marker(ll, { icon: L.divIcon({ className: 'lf-lbl', html: '<span style="border-left:3px solid ' + col + ';padding-left:5px">' + text + '</span>', iconAnchor: [0, 0] }), interactive: false, zIndexOffset: 600 }); }
    function applyLZ() { const show = map.getZoom() >= 12; Object.values(LG).forEach(lg => { if (!lg) return; lg.eachLayer(l => { const el = l.getElement && l.getElement(); if (el) el.style.display = show ? '' : 'none'; }); }); }
    map.on('zoomend', applyLZ);

    async function loadLayer(name) { /* igual que antes */ }
    window.toggleLayer = async function(name) { /* igual que antes */ };
    function refreshLayer(name) { /* igual que antes */ }
    window.refreshAll = function() { ['predios','usos_suelo','reportes_sbn','sbn_puntual','sbn_lineal','sbn_poligonal'].forEach(n => refreshLayer(n)); };

    // ==================== DIBUJO Y MODALES ====================
    drawn = new L.FeatureGroup().addTo(map);
    function buildDrawControl(tipo) { /* igual que antes */ }
    document.querySelectorAll('input[name="drawLayer"]').forEach(r => {
      r.addEventListener('change', () => buildDrawControl(r.value));
    });
    buildDrawControl('predios');
    map.on(L.Draw.Event.CREATED, async e => {
      const tipo = document.querySelector('input[name="drawLayer"]:checked').value;
      pending = e.layer;
      if (tipo === 'sbn_puntual' || tipo === 'sbn_lineal' || tipo === 'sbn_poligonal') {
        openSBNModal(tipo, e.layer);
      } else {
        openEditModal(tipo);
      }
    });
    document.getElementById('btnClear')?.addEventListener('click', () => { drawn.clearLayers(); pending = null; closeSBonMobile(); });

    async function openEditModal(type) { /* igual que antes */ }
    window.closeModal = () => { const m = document.getElementById('editModal'); if(m) m.classList.remove('on'); pending = null; };
    window.submitModal = async () => { /* igual que antes */ };

    const SBN_CONFIG = { /* igual que antes */ };
    async function openSBNModal(tipo, layer) { /* igual que antes */ }
    window.closeSBNModal = function() { document.getElementById('sbnModal').classList.remove('on'); sbnTipoActual = null; sbnLayerActual = null; pending = null; };
    window.guardarSBN = async function() { /* igual que antes */ };

    // REPORTES MODAL
    function cancelReport() { /* ... */ }
    function onMapClick(e) { /* ... */ }
    window.closeReporte = function() { /* ... */ };
    window.saveReporte = async function() { /* ... */ };
    window.irACoordenada = function() { /* ... */ };
    window.registrarPuntoGPS = function(lat, lng) { /* ... */ };

    // ==================== BÚSQUEDA CON DEBOUNCE ====================
    const searchInput = document.getElementById('searchInput');
    let debounceTimer;
    if(searchInput) {
      searchInput.addEventListener('input', e => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => performSearch(e.target.value.trim()), 300);
      });
    }
    async function performSearch(term) { /* igual que antes */ }

    // ==================== ASISTENTE IA ====================
    const aiBtn = document.getElementById('aiBtn');
    const aiPanel = document.getElementById('aiPanel');
    const aiClose = document.getElementById('aiClose');
    const aiMsgs = document.getElementById('aiMsgs');
    const aiInput = document.getElementById('aiInput');
    const aiSend = document.getElementById('aiSend');
    let aiHistory = [], aiOpen = false;
    if(aiBtn) {
      aiBtn.addEventListener('click', () => {
        aiOpen = !aiOpen;
        if(aiPanel) aiPanel.classList.toggle('open', aiOpen);
        if (aiOpen && aiMsgs && aiMsgs.children.length === 0) aiAddMsg('bot', '¡Hola! Soy tu asistente de inteligencia ambiental del Geoportal SBN 🌿\n\nPuedo analizar tus predios, usos de suelo y reportes de campo para ayudarte a identificar oportunidades de **Soluciones Basadas en Naturaleza** en el Caquetá.\n\n¿En qué te ayudo hoy?');
        if (aiOpen && aiInput) setTimeout(() => aiInput.focus(), 300);
      });
    }
    if(aiClose) aiClose.addEventListener('click', () => { aiOpen = false; if(aiPanel) aiPanel.classList.remove('open'); });
    if(aiSend) aiSend.addEventListener('click', aiSubmit);
    if(aiInput) aiInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); aiSubmit(); } });
    function aiAddMsg(role, text) { /* igual que antes */ }
    function aiShowTyping() { /* igual que antes */ }
    function aiHideTyping() { /* igual que antes */ }
    async function aiGetContext() { /* igual que antes */ }
    async function aiSubmit() { /* igual que antes */ }
    window.aiAsk = function(q) { if(aiInput) aiInput.value = q; aiSubmit(); };

    // ==================== UTILIDADES ====================
    function showT(msg, persist) { const t = document.getElementById('toast'); if(t) { t.innerHTML = msg; t.classList.add('on'); if (!persist) setTimeout(() => t.classList.remove('on'), 3200); } }
    document.getElementById('btnGPS')?.addEventListener('click', function() { /* igual que antes */ });

    // Cargar capas iniciales después de que el mapa esté listo
    refreshAll();
  }); // fin DOMContentLoaded
</script>
</body>
</html>
