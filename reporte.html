<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geoportal SBN — Reportes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* Estilos originales (se mantienen) */
    /* ... (se omiten por brevedad, pero en el archivo final están completos) ... */
  </style>
</head>
<body>
<div class="bg"></div><div class="grid"></div>
<header class="hdr">
  <div class="logo"><div class="lm">🌿</div><div><div class="lt">Geoportal SBN</div><span class="ls">Biocomercio Sostenible</span></div></div>
  <div class="hdiv"></div>
  <span class="htitle">📋 Panel de Avances</span>
  <div class="sp"></div>
  <a href="app.html" class="hb pri">🗺️ Mapa</a>
  <button class="hb" onclick="openNewModal()">➕ Nuevo reporte</button>
  <button class="hb" onclick="exportPDF()">📄 PDF</button>
  <button class="hb" onclick="doLogout()" style="color:#ef9a9a">Salir</button>
  <div id="pendingBadge" class="pbadge" style="display:none; margin-left:8px;">⏳ <span id="pendingCount">0</span></div>
</header>
<main class="page">
  <!-- Hero, stats, dashboards igual que original -->
  <div class="hero">...</div>
  <div class="sdiv"><div class="sdiv-line"></div><div class="sdiv-title">Dashboard <span>General</span></div><div class="sdiv-line"></div></div>
  <div class="stats" id="statsGlobal">...</div>
  <div class="dash-grid">...</div>

  <!-- Sección Reportes SBN -->
  <div class="sdiv"><div class="sdiv-line"></div><div class="sdiv-title">Reportes <span>SBN</span></div><div class="sdiv-line"></div></div>
  <div class="stats">...</div>
  <div class="fbar">
    <input type="text" id="rFiltTxt" class="fi" placeholder="🔍 Buscar por nombre o comentario…" oninput="debounceFilter('rep')">
    <select id="rFiltTipo" class="fsel" onchange="filterRep()"><option value="">Todos los tipos</option>...</select>
    <select id="rFiltSort" class="fsel" onchange="filterRep()"><option value="desc">Más recientes</option><option value="asc">Más antiguos</option></select>
    <button class="hb" onclick="exportCSV('rep')">⬇️ CSV</button>
    <button class="hb" id="syncBtn" onclick="manualSync()">🔄 Sincronizar</button>
  </div>
  <div class="tw"><div class="ts"><table><thead><tr><th>#</th><th>Nombre</th><th>Tipo</th><th>Comentarios</th><th>Coordenadas</th><th>Fecha</th><th></th></tr></thead><tbody id="tbRep"><tr class="lrow"><td colspan="7"><span class="spinner"></span> Cargando…</td></tr></tbody></table></div><div class="pag" id="pagRep"></div></div>

  <!-- Usos de suelo y Predios (similar) -->
  ...
</main>

<div class="toast" id="toast"></div>
<div class="mo" id="newModal">...</div>
<div class="mo" id="detModal">...</div>

<script>
  const SB_URL = "https://nyqzlkfphssodbsgeeob.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55cXpsa2ZwaHNzb2Ric2dlZW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMzg5ODAsImV4cCI6MjA4OTcxNDk4MH0.D0mv8NNf3w362u1Q9PRcy9H_vO46u6jIva3SpMaKLng";
  const sb = window.supabase.createClient(SB_URL, SB_KEY);

  // Autenticación
  if(!sessionStorage.getItem('guest')){
    sb.auth.getSession().then(({data})=>{if(!data?.session) window.location.replace('index.html');}).catch(()=>{});
  }
  async function doLogout(){await sb.auth.signOut(); sessionStorage.removeItem('guest'); window.location.replace('index.html');}

  // ==================== OFFLINE QUEUE (compartida con app.html) ====================
  let q = JSON.parse(localStorage.getItem('pendingQueue') || '[]');
  function saveQ() { localStorage.setItem('pendingQueue', JSON.stringify(q)); updatePendingBadge(); }
  function updatePendingBadge() {
    const badge = document.getElementById('pendingBadge');
    const count = q.length;
    document.getElementById('pendingCount').textContent = count;
    badge.style.display = count ? 'inline-flex' : 'none';
  }
  async function syncQ() {
    if (!navigator.onLine || !q.length) return;
    showT('🔄 Sincronizando...', true);
    const toRetry = [];
    for (let i = 0; i < q.length; i++) {
      try {
        const { error } = await sb.from(q[i].table).insert([q[i].data]);
        if (error) throw error;
      } catch(e) {
        toRetry.push(q[i]);
      }
    }
    q = toRetry;
    saveQ();
    if (toRetry.length < q.length) {
      showT('✅ Sincronización completada');
      loadAll(); // recargar datos
    } else if (toRetry.length > 0) {
      showT('⚠️ Algunos registros no se pudieron sincronizar. Reintentando en 30s...');
      setTimeout(syncQ, 30000);
    }
  }
  async function qSave(table, data) {
    if (navigator.onLine) {
      try {
        const { error } = await sb.from(table).insert([data]);
        if (error) throw error;
        return true;
      } catch(e) {
        q.push({ table, data }); saveQ();
        showT('⚠️ Sin conexión — guardado localmente', true);
        return false;
      }
    }
    q.push({ table, data }); saveQ();
    showT('📱 Offline — se enviará al reconectarse', true);
    return false;
  }
  window.addEventListener('online', syncQ);
  updatePendingBadge();
  syncQ();
  async function manualSync() { await syncQ(); }

  // ==================== CARGA DE DATOS ====================
  let repData = [], usoData = [], preData = [], prediosMap = {};
  async function safeLoad(table){
    let res = await sb.from(table).select('*').order('created_at', {ascending:false});
    if(res.error) res = await sb.from(table).select('*');
    if(res.error) throw new Error(table+': '+res.error.message);
    const data = res.data || [];
    data.sort((a,b)=>a.created_at&&b.created_at?new Date(b.created_at)-new Date(a.created_at):(b.id||0)-(a.id||0));
    return data;
  }
  async function loadAll(){
    try {
      const [r1, r2, r3] = await Promise.all([safeLoad('reportes_sbn'), safeLoad('usos_suelo'), safeLoad('predios')]);
      repData = r1; usoData = r2; preData = r3;
      preData.forEach(p=>{ prediosMap[p.id] = p.predio || ('Predio '+p.id); });
      buildGlobalKPIs();
      buildDashboardCharts();
      buildRepStats(); filterRep();
      buildUsoStats(); populateCultivoFilter(); filterUso();
      buildPreStats(); populateMunFilter(); filterPre();
    } catch(e) { showT('❌ Error cargando datos: '+e.message); }
  }

  // ==================== DASHBOARD Y GRÁFICOS (igual que original, pero con mejor exportación) ====================
  // ... (se conservan todas las funciones de dashboard, stats, filtros, tablas)
  // Nota: la función exportPDF se mejora para incluir gráficos como imágenes

  async function exportPDF() {
    showT('📄 Generando PDF...', true);
    // Capturar los canvas de los gráficos
    const charts = ['chartCultivos', 'chartTipos', 'chartMunicipio', 'chartAvance', 'chartPrediosMun'];
    const images = [];
    for (let id of charts) {
      const canvas = document.getElementById(id);
      if (canvas) images.push({ id, dataURL: canvas.toDataURL('image/png') });
    }
    const fecha = new Date().toLocaleString('es-CO', { dateStyle: 'long', timeStyle: 'short' });
    const totalHas = (preData.reduce((s,p)=>s+(parseFloat(p.has)||0),0)+usoData.reduce((s,u)=>s+(parseFloat(u.has)||0),0)).toFixed(1);
    // Construir HTML con imágenes incrustadas
    let html = `<div style="font-family:Arial,sans-serif; padding:20px;"><h1>Geoportal SBN - Informe de Avances</h1><p>${fecha}</p>`;
    html += `<h2>Resumen</h2><p>Predios: ${preData.length} | Hectáreas: ${totalHas} ha | Usos de suelo: ${usoData.length} | Reportes: ${repData.length}</p>`;
    for (let img of images) {
      html += `<h3>${img.id}</h3><img src="${img.dataURL}" style="max-width:100%; margin-bottom:20px;" />`;
    }
    // Tablas resumidas
    html += `<h2>Predios (últimos 10)</h2><table border="1" cellpadding="5"><tr><th>Nombre</th><th>Municipio</th><th>Ha</th></tr>${preData.slice(0,10).map(p=>`<tr><td>${p.predio||'—'}</td><td>${p.municipio||'—'}</td><td>${p.has||0}</td></tr>`).join('')}</table>`;
    html += `<h2>Reportes SBN (últimos 10)</h2><table border="1" cellpadding="5"><tr><th>Nombre</th><th>Tipo</th><th>Fecha</th></tr>${repData.slice(0,10).map(r=>`<tr><td>${r.nombre||'—'}</td><td>${r.tipo_requerimiento||'—'}</td><td>${new Date(r.created_at).toLocaleDateString()}</td></tr>`).join('')}</table>`;
    html += `</div>`;
    const el = document.createElement('div');
    el.innerHTML = html;
    document.body.appendChild(el);
    const opt = { margin: [10,10,10,10], filename: `Informe_SBN_${new Date().toISOString().split('T')[0]}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
    await html2pdf().set(opt).from(el).save();
    document.body.removeChild(el);
    showT('✅ PDF descargado');
  }

  // El resto de funciones (filterRep, renderRep, delRep, saveNewReporte, etc.) se mantienen, pero saveNewReporte ahora usa qSave
  async function saveNewReporte() {
    const nombre = document.getElementById('m_nombre').value.trim();
    const tipo = document.getElementById('m_tipo').value;
    const coment = document.getElementById('m_coment').value.trim();
    const lat = parseFloat(document.getElementById('m_lat').value);
    const lng = parseFloat(document.getElementById('m_lng').value);
    if (!nombre || !tipo) { showT('⚠️ Nombre y tipo son obligatorios'); return; }
    const payload = { nombre, tipo_requerimiento: tipo, comentarios: coment || null };
    if (!isNaN(lat)) payload.lat = lat;
    if (!isNaN(lng)) payload.long = lng;
    const ok = await qSave('reportes_sbn', payload);
    if (ok) {
      // Si se guardó en línea, recargar datos
      loadAll();
    } else {
      // Si se guardó offline, añadir a la lista localmente para reflejar inmediatamente
      const tempId = Date.now();
      repData.unshift({ id: tempId, nombre, tipo_requerimiento: tipo, comentarios: coment, lat, long: lng, created_at: new Date().toISOString() });
      buildRepStats(); filterRep();
    }
    closeNewModal();
    document.getElementById('m_nombre').value = '';
    document.getElementById('m_tipo').value = '';
    document.getElementById('m_coment').value = '';
    document.getElementById('m_lat').value = '';
    document.getElementById('m_lng').value = '';
    showT(ok ? '✅ Reporte guardado' : '📱 Reporte guardado localmente (pendiente de sincronización)');
  }

  // ... (el resto de funciones igual que original, con la única diferencia de que las eliminaciones y ediciones también deberían usar qSave si se desea, pero aquí se mantienen online)
  // Por brevedad, no repetimos todo el código, pero en el archivo final se incluye completo.

  loadAll();
</script>
</body>
</html>
